<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>침몰 카누 + 사람 아이콘 시안</title>
<style>
  body{margin:0;font-family:'Malgun Gothic',sans-serif;background:#eef3ef;padding:10px 0 40px}
  h1{font-size:16px;color:#234;margin:18px 14px 2px}
  p.d{font-size:12.5px;color:#678;margin:0 14px 10px}
  .row{display:flex;align-items:center;gap:22px;margin:0 14px;flex-wrap:wrap}
  .big{width:96px;height:96px;border-radius:16px;background:repeating-linear-gradient(45deg,#dbeede,#dbeede 12px,#d2e8da 12px,#d2e8da 24px);display:flex;align-items:center;justify-content:center}
  .big svg{width:72px;height:72px}
  .pin{width:36px;height:36px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center}
  .pin svg{width:26px;height:26px}
  .lbl{font-size:12px;color:#556}
  .b-red{background:#c62828}.b-navy{background:#13314f}.b-sea{background:#1565c0}
</style></head><body>
<script>
// 공통 물결
var WB='<path d="M0 27q6-4 12 0t12 0 12 0 12 0V48H0Z" fill="#4aa3e0"/>';
var WF='<path d="M0 31q6-4 12 0t12 0 12 0 12 0V48H0Z" fill="#2f80c9"/>';
// 사람: 머리 + 든 팔(구조요청)
function person(x){ return '<circle cx="'+x+'" cy="19" r="3.7" fill="#ffd2a6"/>'
  +'<path d="M'+(x-3.5)+' 23 L'+(x-7)+' 18 M'+(x+3.5)+' 23 L'+(x+7)+' 18" stroke="#ffd2a6" stroke-width="2.6" stroke-linecap="round"/>'; }

// 시안1: 사람(좌) + 카누 기울어 잠김(우)
var V1='<svg viewBox="0 0 48 48">'+WB+person(11)
  +'<g transform="rotate(-20 30 27)"><path d="M16 25Q31 17 44 25Q41 31 30 32Q19 31 16 25Z" fill="#fff"/><path d="M20 25Q31 20 40 25" fill="none" stroke="#bcd6ea" stroke-width="1.4"/></g>'
  +WF+'</svg>';
// 시안2: 카누 뒤집힘(호) + 사람(우)
var V2='<svg viewBox="0 0 48 48">'+WB
  +'<path d="M6 28Q20 16 34 28" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>'
  +person(38)+WF+'</svg>';
// 시안3: 카누 뱃머리 침몰(기울기 큼) + 사람(좌)
var V3='<svg viewBox="0 0 48 48">'+WB+person(10)
  +'<g transform="rotate(34 30 28)"><path d="M18 24Q31 18 42 24Q39 30 30 31Q21 30 18 24Z" fill="#fff"/></g>'
  +'<circle cx="20" cy="24" r="1.8" fill="#bfe2ff"/><circle cx="16" cy="28" r="1.3" fill="#bfe2ff"/>'
  +WF+'</svg>';
function rowf(t,d,svg){ document.write('<h1>'+t+'</h1><p class="d">'+d+'</p><div class="row"><div class="big">'+svg+'</div>'
  +'<div class="pin b-red">'+svg+'</div><span class="lbl">빨강</span>'
  +'<div class="pin b-navy">'+svg+'</div><span class="lbl">남색</span>'
  +'<div class="pin b-sea">'+svg+'</div><span class="lbl">바다색</span></div>'); }
rowf('시안 1 — 카누 기울어 잠김 + 빠진 사람','카누가 옆으로 기울어 잠기고, 옆에서 사람이 팔 들고 떠 있음.',V1);
rowf('시안 2 — 카누 뒤집힘 + 사람','뒤집힌 카누(호 모양) 옆에 사람. 가장 단순·명확.',V2);
rowf('시안 3 — 뱃머리 침몰 + 사람(거품)','카누 앞부분이 가라앉고 사람이 빠진 모습 + 거품.',V3);
</script>
<p class="d" style="margin-top:20px">※ 흰 카누 + 살구색 사람. 시안 번호 + 뱃지색(빨강/남색/바다색)을 골라주세요.</p>
</body></html>
