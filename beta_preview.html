<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>베타 경고 문구 시안</title>
<style>
  body{margin:0;font-family:'Malgun Gothic',sans-serif;background:#e9eef0}
  .wrap{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;padding:20px 10px 40px}
  .scene{width:330px;border-radius:16px;overflow:hidden;background:radial-gradient(125% 90% at 50% 0%,#bfe3ff 0%,#dff1e6 55%,#eef7f0 100%);padding:26px 0}
  .gate-card{position:relative;background:rgba(255,255,255,.94);border-radius:22px;padding:28px 22px 22px;max-width:290px;margin:0 auto;text-align:center;box-shadow:0 12px 34px rgba(20,60,90,.18)}
  .gate-logo{width:68px;height:68px;margin:0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;background:linear-gradient(150deg,#2196f3,#00b894);box-shadow:0 8px 20px rgba(0,150,180,.35)}
  .gate-logo svg{width:46px}
  h1{margin:14px 0 4px;font:800 22px sans-serif;color:#13312a}
  .sub{color:#5a6b62;font:13.5px sans-serif;margin:0 0 16px}
  .feats{list-style:none;margin:0 0 16px;padding:0;text-align:left;display:inline-block}
  .feats li{display:flex;align-items:center;gap:9px;margin:7px 0;font:13px sans-serif;color:#33473e}
  .feats li b{width:24px;height:24px;border-radius:7px;background:#eef5f1;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:400}
  .kbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;background:#FEE500;color:#191600;border:0;border-radius:11px;padding:13px;font:700 15px sans-serif;cursor:pointer;box-shadow:0 6px 16px rgba(254,229,0,.5)}
  small{display:block;margin-top:11px;color:#9aa6a0;font-size:11px}
  /* 경고 A: 앰버 박스 */
  .warnA{display:flex;gap:8px;text-align:left;background:#fff8e1;border:1px solid #ffe082;border-left:4px solid #ffb300;border-radius:9px;padding:9px 11px;margin:0 0 16px;font:12px/1.5 sans-serif;color:#6d4c00}
  .warnA .ic{font-size:15px;flex:none}
  /* 경고 B: 작은 회색 노트 */
  .warnB{margin-top:11px;font:11.5px/1.5 sans-serif;color:#b08900;background:#fffdf5;border-radius:8px;padding:7px 9px}
  .tag{font:700 13px sans-serif;color:#456;margin:6px 0 2px;text-align:center}
  .beta{display:inline-block;background:#ff7043;color:#fff;font:700 10px sans-serif;padding:2px 7px;border-radius:8px;vertical-align:middle;margin-left:6px}
</style></head><body>
<script>
var CV='<svg viewBox="0 0 64 40"><path d="M2 20C2 13 16 10 32 10C48 10 62 13 62 20C62 27 48 30 32 30C16 30 2 27 2 20Z" fill="#fff"/><path d="M9.5 20C9.5 15.7 19.5 13.8 32 13.8C44.5 13.8 54.5 15.7 54.5 20C54.5 24.3 44.5 26.2 32 26.2C19.5 26.2 9.5 24.3 9.5 20Z" fill="#dfeefb"/><path d="M23 15.5V24.5M41 15.5V24.5" stroke="#bcd6ea" stroke-width="1.5" stroke-linecap="round"/></svg>';
var FE='<ul class="feats"><li><b>💧</b>상수원보호구역 안내</li><li><b>📍</b>카누 런칭·랜딩 장소</li><li><b>🛶</b>카누잉 추천 코스</li><li><b>📏</b>물길 거리 측정</li></ul>';
function card(warnHtml, betaTag){ return '<div class="scene"><div class="gate-card"><div class="gate-logo">'+CV+'</div>'
  +'<h1>마이카누 지도'+(betaTag?'<span class="beta">BETA</span>':'')+'</h1><p class="sub">전국 카누 명소를 한눈에</p>'+FE
  +(warnHtml.indexOf('warnA')>=0?warnHtml:'')
  +'<button class="kbtn">💬 카카오로 시작하기</button>'
  +(warnHtml.indexOf('warnB')>=0?warnHtml:'<small>로그인 후 바로 이용할 수 있어요</small>')
  +'</div></div>'; }
var WARN='⚠️ <b>베타 서비스</b>입니다. 접속·속도가 불안정할 수 있고, 남긴 코멘트가 사라질 수 있어요.';
document.write('<div class="tag">시안 A — 앰버 경고 박스 (로그인 버튼 위) + BETA 태그</div>');
document.write('<div class="wrap">'+card('<div class="warnA"><span class="ic">⚠️</span><span>베타 서비스입니다. 접속·속도가 불안정할 수 있고, 남긴 코멘트가 사라질 수 있어요.</span></div>', true)+'</div>');
document.write('<div class="tag">시안 B — 버튼 아래 작은 노트 + BETA 태그</div>');
document.write('<div class="wrap">'+card('<div class="warnB">⚠️ 베타 서비스 — 접속·속도 불안정 및 코멘트 유실 가능</div>', true)+'</div>');
</script>
</body></html>
