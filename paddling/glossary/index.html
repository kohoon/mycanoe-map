<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="오픈 카누 패들링에서 사용하는 주요 용어를 기준별로 정리한 사전">
  <title>패들 용어사전</title>
  <style>
    :root{--ink:#18302c;--muted:#61736f;--line:#d7e2df;--paper:#fff;--green:#116a58;--green-soft:#e6f3ee;--blue:#185e8c;--bg:#f3f7f5}
    *{box-sizing:border-box}
    html{scroll-behavior:smooth;scroll-padding-top:126px}
    body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic",sans-serif}
    button,input{font:inherit}
    .topbar{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.97);border-bottom:1px solid var(--line);backdrop-filter:blur(12px)}
    .top-inner{width:min(980px,100%);margin:auto;padding:15px 20px 12px}
    .head{display:flex;align-items:center;justify-content:space-between;gap:16px}
    h1{margin:0;font-size:24px;line-height:1.2;letter-spacing:0}
    .subtitle{margin:4px 0 0;color:var(--muted);font-size:12px}
    .back{flex:none;text-decoration:none;color:var(--green);border:1px solid #9cc7bb;border-radius:6px;padding:9px 12px;background:#fff;font-size:13px;font-weight:900}
    .search{width:min(420px,100%);margin-top:12px;border:1px solid #b9c9c5;border-radius:6px;padding:10px 12px;color:var(--ink);background:#fff}
    .search:focus{outline:2px solid rgba(17,106,88,.15);border-color:var(--green)}
    .layout{width:min(980px,100%);margin:auto;padding:24px 20px 56px;display:grid;grid-template-columns:180px minmax(0,1fr);gap:28px}
    aside{position:sticky;top:137px;align-self:start}
    aside strong{display:block;margin-bottom:8px;color:#71817d;font-size:12px}
    aside a{display:block;padding:8px 10px;border-left:2px solid var(--line);color:#50635e;text-decoration:none;font-size:13px;font-weight:800}
    aside a:hover{border-color:var(--green);color:var(--green);background:var(--green-soft)}
    .intro{margin-bottom:28px;padding:15px 17px;border-left:4px solid var(--green);background:#fff;color:#425852;font-size:13px;line-height:1.7}
    .group{margin-bottom:34px}
    .group h2{margin:0 0 8px;padding-bottom:9px;border-bottom:2px solid #aac9c1;font-size:19px;letter-spacing:0}
    .anatomy{margin:14px 0 18px;border:1px solid #bfd1cc;background:#fff;overflow:auto}
    .anatomy svg{display:block;width:100%;min-width:620px;height:auto}
    .anatomy figcaption{padding:9px 12px;border-top:1px solid var(--line);color:var(--muted);font-size:11px;line-height:1.6}
    dl{margin:0}
    .term{display:grid;grid-template-columns:minmax(150px,210px) minmax(0,1fr);gap:20px;padding:12px 4px;border-bottom:1px solid var(--line)}
    dt{margin:0;font-size:13px;font-weight:900;line-height:1.5}
    dt span{display:block;color:var(--blue);font-size:11px}
    dd{margin:0;color:#425852;font-size:13px;line-height:1.65}
    .empty{display:none;padding:36px 16px;background:#fff;border:1px solid var(--line);text-align:center;color:var(--muted)}
    footer{border-top:1px solid var(--line);padding:22px;text-align:center;color:var(--muted);font-size:11px}
    @media(max-width:720px){
      html{scroll-padding-top:132px}
      .top-inner{padding:13px 14px 10px}
      h1{font-size:21px}
      .layout{display:block;padding:17px 14px 40px}
      aside{position:static;margin-bottom:18px;overflow-x:auto}
      aside strong{display:none}
      aside nav{display:flex;width:max-content;gap:6px}
      aside a{border:1px solid var(--line);border-radius:5px;background:#fff;white-space:nowrap;padding:7px 9px;font-size:12px}
      .term{grid-template-columns:1fr;gap:3px;padding:11px 2px}
      dt span{display:inline;margin-left:5px}
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="top-inner">
      <div class="head">
        <div><h1>패들 용어사전</h1><p class="subtitle">오픈 카누 기술을 정확히 이해하기 위한 용어 기준</p></div>
        <a class="back" href="../">패들링 스쿨</a>
      </div>
      <input id="search" class="search" type="search" placeholder="용어 검색: 온사이드, 캐치, 거널…" aria-label="패들 용어 검색">
    </div>
  </header>
  <div class="layout">
    <aside><strong>분류</strong><nav id="nav"></nav></aside>
    <main>
      <div class="intro">온사이드·오프사이드는 <strong>패들을 사용하는 쪽</strong>, 인사이드·아웃사이드는 <strong>회전하는 원</strong>을 기준으로 합니다. 같은 방향을 가리키는 상황에서도 기준은 서로 다릅니다.</div>
      <div id="content"></div>
      <div id="empty" class="empty">일치하는 용어가 없습니다.</div>
    </main>
  </div>
  <footer>교육 자료마다 번역이 다를 수 있어 영문 용어를 함께 표기합니다.</footer>
  <script>
    const groups=[
      {id:"direction",name:"방향 기준",terms:[
        ["온사이드","Onside","현재 패들을 물에 넣어 사용하는 쪽. 솔로 카누에서는 패들러가 주로 패들링하는 측면을 뜻합니다."],
        ["오프사이드","Offside","온사이드의 반대쪽. 패들을 바꾸지 않고 이쪽에서 수행하는 동작은 크로스 동작이라고도 합니다."],
        ["인사이드","Inside","카누가 회전하는 원의 안쪽. 패들의 위치가 아니라 회전 방향을 기준으로 정합니다."],
        ["아웃사이드","Outside","카누가 회전하는 원의 바깥쪽. 회전 방향에 따라 온사이드 또는 오프사이드와 같은 쪽이 될 수 있습니다."],
        ["인사이드 피벗 턴","Inside pivot turn","선수가 패들 쪽으로 도는 제자리 회전. 이 문맥에서는 인사이드와 온사이드가 같은 쪽을 가리킵니다."],
        ["아웃사이드 피벗 턴","Outside pivot turn","선수가 패들 반대쪽으로 도는 제자리 회전. 이 문맥에서는 아웃사이드와 오프사이드가 같은 쪽을 가리킵니다."]
      ]},
      {id:"paddle",name:"패들 구조",terms:[
        ["그립","Grip","패들 위쪽에서 그립 잡은 손으로 쥐는 손잡이."],["샤프트","Shaft","그립과 블레이드를 연결하는 긴 자루."],
        ["스로트","Throat","샤프트가 넓어지며 블레이드로 이어지는 목 부분."],["블레이드","Blade","물에 넣어 힘을 전달하는 넓은 부분."],
        ["팁","Tip","블레이드의 가장 아래쪽 끝."],["파워 페이스","Power face","추진 스트로크에서 물을 받아 힘을 만드는 블레이드 앞면."],
        ["비파워 페이스","Back face / Non-power face","파워 페이스 반대쪽 면. 로우 브레이스 등에서는 이 면으로 수면을 누릅니다."],
        ["숄더","Shoulder","스로트에서 블레이드의 최대 폭 방향으로 넓어지는 양쪽 윗부분."],
        ["블레이드 엣지","Blade edge","블레이드 양옆의 가장자리. 슬라이스와 스컬링에서는 진행 방향 쪽 엣지 각도가 중요합니다."],
        ["리딩 엣지","Leading edge","블레이드가 물속에서 이동할 때 앞서 나가는 쪽 가장자리."],
        ["트레일링 엣지","Trailing edge","블레이드가 물속에서 이동할 때 뒤따르는 쪽 가장자리."],
        ["팜 그립","Palm grip","손바닥 전체로 감싸기 쉬운 둥글고 넓은 형태의 그립."],
        ["T 그립","T-grip","손가락으로 걸고 방향을 명확히 제어하기 쉬운 T자 형태의 그립."],
        ["비버테일 블레이드","Beavertail blade","어깨에서 점차 넓어졌다가 둥근 팁으로 좁아지는 길고 전통적인 블레이드 형상."],
        ["슈거 아일랜드 블레이드","Sugar Island blade","비버테일보다 짧고 넓으며 비교적 평행한 엣지를 가진 블레이드 형상."]
      ]},
      {id:"phases",name:"스트로크 단계",terms:[
        ["셋업","Setup","스트로크를 시작하기 전에 몸통, 손과 패들을 사용할 위치로 준비하는 단계."],["캐치","Catch","블레이드를 물에 넣어 저항을 확보하는 단계."],
        ["추진 구간","Power phase","고정된 블레이드에 힘을 전달해 카누를 움직이는 단계."],["엑시트","Exit","추진을 마친 블레이드를 물에서 빼는 단계."],
        ["리커버리","Recovery","다음 캐치를 위해 패들과 몸을 시작 위치로 되돌리는 단계."],["슬라이스","Slice","블레이드 날을 진행 방향으로 세워 물의 저항을 최소화하며 이동시키는 동작."],
        ["피치","Pitch","물속 블레이드 면이 물을 받는 각도. 작은 각도 변화로 드로우·프라이·스컬링의 힘 방향이 달라집니다."],
        ["페더링","Feathering","회수할 때 블레이드 면을 수평에 가깝게 돌려 공기나 바람의 저항을 줄이는 동작."],
        ["케이던스","Cadence","스트로크를 반복하는 속도와 리듬."],
        ["스트로크 연결","Linked strokes","한 기술의 엑시트와 리커버리를 다음 기술의 셋업·캐치로 끊김 없이 이어 가는 방식."]
      ]},
      {id:"body",name:"손과 자세",terms:[
        ["그립 잡은 손","Grip hand / Control hand","패들 그립을 잡고 블레이드 면과 샤프트 각도를 제어하는 위쪽 손."],
        ["샤프트 잡은 손","Shaft hand","샤프트를 잡고 블레이드에 힘을 전달하는 아래쪽 손."],
        ["패들러 박스","Paddler's box","몸통과 양팔이 만드는 안전한 작업 범위. 손이 몸 뒤로 빠지고 팔꿈치가 과도하게 벌어지면 어깨 부상 위험이 커집니다."],
        ["몸통 회전","Torso rotation","팔만 움직이지 않고 골반 위에서 가슴과 어깨를 회전해 패들의 이동 거리와 힘을 만드는 동작."],
        ["닐링","Kneeling","무릎을 카누 바닥에 대고 무릎·허벅지·발로 선체를 제어하는 자세."],
        ["퍼치 자세","Perched seating","좌석 앞쪽에 걸터앉아 무릎을 낮추고 골반과 몸통을 자유롭게 사용하는 자세."],
        ["스태킹","Stacking the hands","샤프트를 수직에 가깝게 만들기 위해 그립 잡은 손을 샤프트 잡은 손 위쪽에 정렬하는 것."],
        ["리치","Reach","몸통 회전과 자세를 이용해 블레이드를 캐치 위치로 보내는 동작. 팔만 길게 뻗는 것과 구분합니다."]
      ]},
      {id:"strokes",name:"주요 스트로크",terms:[
        ["전진 스트로크","Forward stroke","블레이드를 선수 가까이에 넣고 선체 옆에서 힘을 전달해 카누를 앞으로 움직이는 기본 스트로크."],
        ["백 스트로크","Back stroke","블레이드로 물을 앞쪽으로 밀어 감속하거나 카누를 뒤로 움직이는 스트로크."],
        ["J 스트로크","J stroke","전진 스트로크 끝에 짧은 방향 보정을 더해 패들 반대쪽으로 돌아가려는 선수를 제어하는 기술."],
        ["캐나디언 스트로크","Canadian stroke / Knifed J","전진 추진 뒤 블레이드를 물속에서 얇게 앞으로 회수하며 직진 보정을 이어 가는 기술."],
        ["인디언 스트로크","Indian stroke / Hunting stroke","블레이드를 물속에서 뒤집어 회수와 다음 추진을 조용하게 연결하는 직진 기술."],
        ["C 스트로크","C stroke","선수 드로우, 전진 추진과 선미 보정을 C자 경로로 연결하는 솔로 카누 기술."],
        ["드로우","Draw","블레이드를 카누 옆에 놓고 선체를 패들 쪽으로 당기는 횡이동 스트로크."],
        ["프라이","Pry","거널을 지렛점으로 사용해 카누를 패들 반대쪽으로 밀어내는 횡이동 스트로크."],
        ["스컬링","Sculling","블레이드의 앞날 각도를 바꾸며 앞뒤로 움직여 연속적인 힘을 만드는 기술."],
        ["스윕","Sweep","블레이드로 선수나 선미 주변의 넓은 원을 그려 회전력을 만드는 스트로크."],
        ["러더","Rudder","진행 중 선미 부근에 블레이드를 고정해 카누의 방향을 유지하거나 미세하게 바꾸는 기술."],
        ["선미 프라이","Stern pry","선미 옆에서 거널을 지렛점으로 사용해 선수를 패들 쪽으로 돌리거나 직진을 보정하는 기술."],
        ["보우 드로우","Bow draw","선수 옆의 물을 당겨 선수를 패들 쪽으로 움직이는 방향 전환 스트로크."],
        ["크로스 보우 드로우","Cross-bow draw","패들을 손에서 바꾸지 않고 반대쪽 선수 앞에 블레이드를 넣어 선수를 그쪽으로 당기는 기술."],
        ["로우 브레이스","Low brace","비파워 페이스를 수면에 낮게 대어 순간적인 지지를 만들고 하체로 선체를 복원하는 기술."],
        ["하이 브레이스","High brace","파워 페이스로 적극적인 지지를 만드는 기술. 팔꿈치가 어깨선 위나 몸 뒤로 가지 않게 해야 합니다."]
      ]},
      {id:"canoe",name:"카누 구조와 자세",terms:[
        ["보우·선수","Bow","카누의 앞쪽 끝."],["스턴·선미","Stern","카누의 뒤쪽 끝."],["거널","Gunwale","카누 선체 위쪽 가장자리를 따라 이어지는 테두리."],
        ["기울이기","Heel / Tilt","카누를 한쪽으로 기울여 물에 잠기는 선체 형상을 바꾸는 동작."],["에징","Edging","기울기를 제어해 선체의 회전성과 진행 방향을 조절하는 기술."],
        ["트림","Trim","선수와 선미에 실리는 무게의 균형과 그에 따른 선체의 앞뒤 기울기."],["피벗 포인트","Pivot point","카누가 회전할 때 중심이 되는 지점. 속도와 트림, 스트로크에 따라 위치가 달라집니다."],
        ["선체","Hull","물에 직접 닿아 부력과 이동 특성을 만드는 카누의 몸체."],
        ["로커","Rocker","옆에서 봤을 때 킬 라인이 선수와 선미로 갈수록 위로 들린 정도. 일반적으로 크면 회전이 쉽고 직진 유지력은 줄어듭니다."],
        ["차인","Chine","카누 바닥에서 측면으로 이어지는 선체 단면의 모서리 또는 곡면 구간."],
        ["텀블홈","Tumblehome","선체 측면이 최대 폭 지점 위에서 거널 쪽으로 다시 좁아지는 형상."],
        ["빔·전폭","Beam","카누의 가장 넓은 지점에서 측정한 전체 폭."],
        ["프리보드","Freeboard","현재 수면에서 거널 또는 선체 상단까지 남아 있는 높이."],
        ["흘수","Draft","현재 수면에서 선체의 가장 깊이 잠긴 지점까지의 깊이."],
        ["수선","Waterline","선체와 수면이 맞닿아 형성되는 선."],
        ["킬 라인","Keel line","선체 바닥 중앙을 선수에서 선미까지 잇는 기준선."],
        ["요크","Yoke","카누를 어깨에 메고 운반할 때 사용하는 중앙 가로대."],
        ["시트","Seat","패들러가 앉는 좌석."],
        ["스워트","Thwart","선체 양쪽 거널을 연결해 폭과 형태를 유지하는 가로대."],
        ["데크 플레이트","Deck plate","선수와 선미 끝에서 양쪽 거널 사이를 덮고 선체 끝부분을 보강하는 판."],
        ["캐리 핸들","Carry handle","선수와 선미 가까이에 설치해 두 사람이 카누를 들어 운반할 때 잡는 손잡이."],
