name: Daily Kakao collection

on:
  schedule:
    # 09:00 Asia/Seoul = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-kakao-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          python -m playwright install --with-deps chromium

      - name: Restore local secrets
        env:
          KAKAO_AUTH_STATE_B64: ${{ secrets.KAKAO_AUTH_STATE_B64 }}
          VWORLD_KEY: ${{ secrets.VWORLD_KEY }}
          HRFCO_KEY: ${{ secrets.HRFCO_KEY }}
          KAKAO_JS_KEY: ${{ secrets.KAKAO_JS_KEY }}
          ADMIN_KEY: ${{ secrets.ADMIN_KEY }}
        run: |
          test -n "$KAKAO_AUTH_STATE_B64"
          printf '%s' "$KAKAO_AUTH_STATE_B64" | base64 --decode > auth_state.json
          test -n "$VWORLD_KEY" && printf '%s' "$VWORLD_KEY" > vworld_key.txt || true
          test -n "$HRFCO_KEY" && printf '%s' "$HRFCO_KEY" > hrfco_key.txt || true
          test -n "$KAKAO_JS_KEY" && printf '%s' "$KAKAO_JS_KEY" > kakao_js_key.txt || true
          test -n "$ADMIN_KEY" && printf '%s' "$ADMIN_KEY" > admin_key.txt || true

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run daily collection
        run: python tools/daily_collect.py

      - name: Push changes if any
        run: |
          git fetch origin main
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            git push
          else
            echo "No committed changes to push."
          fi
