<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><title>마이카누 카페 버튼 시안</title>
<style>
  body{margin:0;font-family:'Malgun Gothic',sans-serif;background:#eef3ef;padding-bottom:40px}
  h1{font-size:17px;color:#234;margin:18px 14px 2px}
  p.d{font-size:12.5px;color:#678;margin:0 14px 8px}
  .stage{position:relative;height:150px;margin:0 10px 6px;border-radius:10px;overflow:hidden;
    background:repeating-linear-gradient(45deg,#dbeede,#dbeede 18px,#d2e8da 18px,#d2e8da 36px)}
  .mid{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
  .cv{width:20px;height:auto;flex:none}
  /* A: 컴팩트 그린 필 + 흰 카누 */
  .cA{display:inline-flex;align-items:center;gap:7px;background:#03C75A;color:#fff;padding:9px 14px 9px 11px;border-radius:22px;box-shadow:0 4px 12px rgba(3,199,90,.45);font:700 13.5px sans-serif;cursor:pointer}
  /* B: 그린 필 + N 뱃지 */
  .cB{display:inline-flex;align-items:center;gap:8px;background:#03C75A;color:#fff;padding:8px 14px 8px 8px;border-radius:22px;box-shadow:0 4px 12px rgba(3,199,90,.45);font:700 13.5px sans-serif;cursor:pointer}
  .cB .nb{width:22px;height:22px;border-radius:6px;background:#fff;color:#03C75A;display:flex;align-items:center;justify-content:center;font:900 13px sans-serif}
  /* C: 둥근 아이콘 버튼(카누) + 작은 라벨 */
  .cC{display:inline-flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer}
  .cC .circ{width:46px;height:46px;border-radius:50%;background:#03C75A;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(3,199,90,.5)}
  .cC .lb{font:700 11px sans-serif;color:#1b5e34;background:#fff;padding:1px 7px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  /* D: 미니 카드 */
  .cD{display:inline-flex;align-items:center;gap:8px;background:#fff;padding:6px 12px 6px 6px;border-radius:12px;box-shadow:0 3px 12px rgba(0,0,0,.18);cursor:pointer}
  .cD .badge{width:30px;height:30px;border-radius:8px;background:#03C75A;display:flex;align-items:center;justify-content:center}
  .cD .t{font:800 13px sans-serif;color:#1f2d25}
</style></head><body>
<script>
var CV='<svg class="cv" viewBox="0 0 64 40"><path d="M2 20C2 13 16 10 32 10C48 10 62 13 62 20C62 27 48 30 32 30C16 30 2 27 2 20Z" fill="#fff"/><path d="M9.5 20C9.5 15.7 19.5 13.8 32 13.8C44.5 13.8 54.5 15.7 54.5 20C54.5 24.3 44.5 26.2 32 26.2C19.5 26.2 9.5 24.3 9.5 20Z" fill="#cfe3f5"/><path d="M23 15.5V24.5M41 15.5V24.5" stroke="#5a9bd4" stroke-width="2.2" stroke-linecap="round"/></svg>';
function W(h){document.write(h);}
</script>
<h1>시안 A — 컴팩트 그린 필 + 흰 카누</h1><p class="d">카누 아이콘으로 '마이카누' + 그린으로 네이버카페. 가장 콤팩트하면서 명확.</p>
<div class="stage"><div class="mid"><script>W('<span class="cA">'+CV+'마이카누 카페</span>')</script></div></div>

<h1>시안 B — 그린 필 + N 뱃지</h1><p class="d">네이버 N 강조 + '마이카누 카페' 텍스트.</p>
<div class="stage"><div class="mid"><span class="cB"><span class="nb">N</span>마이카누 카페</span></div></div>

<h1>시안 C — 둥근 카누 버튼 + 작은 '카페' 라벨</h1><p class="d">아이콘 중심(가장 작음). 라벨로 카페 표시.</p>
<div class="stage"><div class="mid"><span class="cC"><span class="circ"><script>W(CV)</script></span><span class="lb">마이카누 카페</span></span></div></div>

<h1>시안 D — 미니 카드</h1><p class="d">흰 카드 + 카누 뱃지 + 텍스트. 기존 카드보다 작음.</p>
<div class="stage"><div class="mid"><span class="cD"><span class="badge"><script>W(CV)</script></span><span class="t">마이카누 카페</span></span></div></div>
</body></html>
